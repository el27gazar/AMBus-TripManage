<div class="container">
   <h2>Dashboard</h2>

    <div class="cards">
      @for(item of AllStatesKeys;track $index){
        <div class="card">
          <div class="card-header">
            <h3>{{item}}</h3>
          </div>
          <div class="card-body">
            <h3>{{AllStatesValues[item]}}</h3>
          </div>
        </div>
      }


    </div>

    <div class="revenue">
      <h3>Popular Routes</h3>
      <hr>
      <table>
        <tr>
          <th>From</th>
          <th>To</th>
          <th>Count of Booking</th>
          <th>Rate</th>
        </tr>
        @for(item of AllPopular;track $index){
          <tr>
            <td>{{item.fromName}}</td>
