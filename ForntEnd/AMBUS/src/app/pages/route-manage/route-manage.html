<div class="container">
  <h2>Manage Routes</h2>
  <div class="search">
    <form [formGroup]="formGroup">
        <input type="text" placeholder="Route Name" formControlName="name"/>
        <button type="submit" (click)="search()" class="btn-search">Search</button>
        <button type="submit" (click)="Create()" class="btn-search">Add</button>
    </form>
  </div>

  <table class="user-list">
    <thead>
      <tr>
        <th>Name</th>
        <th>isActive</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody>
      @for (item of AllRoutes; track item.id) {
      <tr>
        <td>{{item.name}}</td>
        <td>{{item.isActive}}</td>
        <td>
          <button class="edit" (click)="GetById(item.id)"><i class="bi bi-pencil-fill"></i></button>
          <button class="delete" (click)="Delete(item.id)"><i class="bi bi-trash3-fill"></i></button>
        </td>
      </tr>
     } @empty {
      <tr>
        <td colspan="6">No Route Found</td>
      </tr>
      }

    </tbody>
  </table>

  <div class="toast" id="toastError">
    <p class="toast-message"> </p>
  </div>
</div>

<div class="overlay hide"></div>
<div class="modal hide">
  <h2 class="h-form"> Update Route </h2>
  <form id="modalForm" [formGroup]="updateForm" (submit)="Update()">
      <label>Name</label>
      <input type="text" placeholder="Name" formControlName="updateName" />
    <button class="submit-from" type="submit">Submit</button>
  </form>

  <button class="close-modal" (click)="closeModal()">X</button>
</div>
