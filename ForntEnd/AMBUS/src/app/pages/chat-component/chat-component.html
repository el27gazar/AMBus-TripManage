<div class="chat-widget">

  <div class="header">
    Support Team
  </div>

  <div class="body">

    <div *ngFor="let message of messages" class="message" [class.mine]="message.senderId === currentUserId">

      <div class="bubble">
        {{message.content}}
      </div>

    </div>

  </div>

  <div class="footer">

    <input [(ngModel)]="message" placeholder="Write message...">

    <button (click)="send()">
      ➤
    </button>

  </div>

</div>
