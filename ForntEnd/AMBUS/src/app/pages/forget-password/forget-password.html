<div class="container-login">
  <div class="landing-login">
    <div>
      <h2 class="h-lan">Welcome, Back</h2>
      <p class="p-lan">Enter your Email to send Verification Code </p>
    </div>
    <img class="img-lan" src="assets/images/busWithoutBacd-compressed.webp" alt="bus" />
  </div>

  <div class="form-login">
    <h2 class="h-form">Forget Password</h2>
    <form [formGroup]="ForgetForm" (submit)="Send()"]>
      <input type="email" placeholder="Email Address" formControlName="Email" />
       @if(Email.dirty){
         @if(Email.getError("required")){
            <p class="Error"> ! Validation error: Email Address Is Required </p>
         }
         @if(Email.getError("email")){
            <p class="Error"> ! Validation error: Invalid Email Address </p>
         }
       }
      <button class="submit-from" type="submit">Send</button>
    </form>
  </div>

  <div class="toast" id="toastError">
    <p class="toast-message"> </p>
  </div>
</div>
